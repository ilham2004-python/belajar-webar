<!DOCTYPE html>
<html>
<head>
    <title>AR Kereta Api 3D</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro">
            
            <a-entity position="0 0.5 0" scale="0.6 0.6 0.6" animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
                
                <a-box position="0 0 0" width="3" height="0.4" depth="1.2" color="#222222"></a-box>

                <a-box position="-1 0.8 0" width="1" height="1.2" depth="1.2" color="#0055ff"></a-box>
                <a-box position="-1 1.45 0" width="1.2" height="0.1" depth="1.4" color="#ffaa00"></a-box>

                <a-cylinder position="0.5 0.6 0" radius="0.5" height="1.8" rotation="0 0 90" color="#cc0000"></a-cylinder>

                <a-cylinder position="1.1 1.3 0" radius="0.2" height="0.6" color="#111111"></a-cylinder>
                <a-cone position="1.1 1.7 0" radius-bottom="0.2" radius-top="0.3" height="0.3" color="#ffaa00"></a-cone>

                <a-cylinder position="-1 -0.2 0.65" radius="0.3" height="0.1" rotation="90 0 0" color="#ffcc00"></a-cylinder>
                <a-cylinder position="0 -0.2 0.65" radius="0.3" height="0.1" rotation="90 0 0" color="#ffcc00"></a-cylinder>
                <a-cylinder position="1 -0.2 0.65" radius="0.3" height="0.1" rotation="90 0 0" color="#ffcc00"></a-cylinder>

                <a-cylinder position="-1 -0.2 -0.65" radius="0.3" height="0.1" rotation="90 0 0" color="#ffcc00"></a-cylinder>
                <a-cylinder position="0 -0.2 -0.65" radius="0.3" height="0.1" rotation="90 0 0" color="#ffcc00"></a-cylinder>
                <a-cylinder position="1 -0.2 -0.65" radius="0.3" height="0.1" rotation="90 0 0" color="#ffcc00"></a-cylinder>

                <a-cone position="1.6 0.2 0" radius-bottom="0.6" radius-top="0.1" height="0.5" rotation="0 0 -90" color="#444444"></a-cone>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
